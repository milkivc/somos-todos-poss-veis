name: Atlas public regression tests

on:
  workflow_dispatch:
    inputs:
      atlas_url:
        description: 'Published Apps Script Atlas URL'
        required: false
        default: 'https://script.google.com/macros/s/AKfycbw0X-g5f6dpkBcVl0BcqC0AOZIBA_Q1y7iOHOXKtGds_UmVCD6SV8dbCMP0zm8Ecc6Oaw/exec?v=test'

permissions:
  contents: read

jobs:
  test-public-interface:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Atlas public tests
        env:
          ATLAS_URL: ${{ github.event.inputs.atlas_url }}
        run: npm run test:atlas

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
