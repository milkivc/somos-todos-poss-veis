name: Deploy Google Apps Script

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'Código.js'
      - 'Interface.html'
      - 'appsscript.json'
      - 'ZZ_AtlasAssetsFix.js'
      - '.github/workflows/deploy-appscript.yml'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Configure clasp authentication
        run: |
          printf '%s' '${{ secrets.CLASPRC_JSON }}' > ~/.clasprc.json
          cat > .clasp.json <<'EOF'
          {
            "scriptId": "1KeKap98baPdPO7hnAkXLWxTHgJceBz6m1XGoWEHRAAOcqEhRgYxeeCsP",
            "rootDir": "",
            "scriptExtensions": [".js", ".gs"],
            "htmlExtensions": [".html"],
            "jsonExtensions": [".json"],
            "filePushOrder": ["Código.js", "ZZ_AtlasAssetsFix.js", "Interface.html", "appsscript.json"],
            "skipSubdirectories": true
          }
          EOF

      - name: Push official files to Google Apps Script
        run: clasp push --force

      - name: Update published web app deployment
        run: |
          clasp deploy --deploymentId AKfycbw0X-g5f6dpkBcVl0BcqC0AOZIBA_Q1y7iOHOXKtGds_UmVCD6SV8dbCMP0zm8Ecc6Oaw --description "official-public-atlas-${{ github.sha }}"
